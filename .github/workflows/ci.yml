name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.dependabot.outputs.app || steps.filter.outputs.app }}
      docs: ${{ steps.dependabot.outputs.docs || steps.filter.outputs.docs }}
    steps:
    - id: dependabot
      if: github.actor == 'dependabot[bot]'
      run: |
        echo "app=true" >> "$GITHUB_OUTPUT"
        echo "docs=true" >> "$GITHUB_OUTPUT"

    - if: github.actor != 'dependabot[bot]'
      uses: actions/checkout@v4
    - id: filter
      if: github.actor != 'dependabot[bot]'
      uses: dorny/paths-filter@v3
      with:
        filters: |
          app:
            - 'src/**'
            - 'package.json'
            - 'tsconfig*.json'
            - 'vite*.ts'
            - 'electron.vite.config.ts'
          docs:
            - 'docs/**'
            - '*.md'

  validate:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.docs == 'true'

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci 

  lint-and-types:
    timeout-minutes: 25
    runs-on: ${{ matrix.os }}
    needs: [changes]
    if: needs.changes.outputs.app == 'true'
    strategy:
      matrix:
        node-version: [20.x] 
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install Dependencies
      run: npm ci
    - name: Run Type Check
      run: npm run type-check
      env:
        NODE_OPTIONS: --max-old-space-size=6144

    - name: Run Linter
      run: npm run lint
      env:
        NODE_OPTIONS: --max-old-space-size=4096

  tests:
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    needs: [changes]
    if: needs.changes.outputs.app == 'true'
    strategy:
      matrix:
        node-version: [20.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install Dependencies
      run: npm ci
    - name: Run Tests
      run: npm test
      env:
        NODE_OPTIONS: --max-old-space-size=6144

  proxy-e2e:
    timeout-minutes: 35
    runs-on: ${{ matrix.os }}
    needs: [changes]
    if: needs.changes.outputs.app == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache Rust artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          src/native -> src/native/target

    - name: Check Rust Formatting
      working-directory: src/native
      run: cargo fmt -- --check

    - name: Run Rust Linter (Clippy)
      working-directory: src/native
      run: cargo clippy -- -D warnings

    - name: Build Rust services
      working-directory: src/native
      run: cargo build --release -p tengra-db-service -p tengra-proxy

    - name: Run Rust Tests
      working-directory: src/native
      run: cargo test

    - name: Run E2E Tests
      run: npm run test:e2e
      env:
        NODE_OPTIONS: --max-old-space-size=4096

  build-app:
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    needs: [tests, lint-and-types]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    - name: Install Dependencies
      run: npm ci
    - name: Build Application
      run: npm run build
      env:
        NODE_OPTIONS: --max-old-space-size=6144