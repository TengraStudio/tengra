name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Security Audit (npm audit)
      run: npm audit --audit-level=high

    - name: Node.js Security Scan (njsscan)
      uses: ajinabraham/njsscan-action@v0.0.3
      with:
        args: '.'

    - name: Run Tests
      run: npm test

    - name: Build Application
      run: npm run build
