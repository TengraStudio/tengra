name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Type Check
      run: npm run type-check

    - name: Run Linter
      run: npm run lint

    - name: Secrets Scan (secretlint)
      run: npx secretlint "**/*"

    - name: Secrets Scan (detect-secrets)
      run: |
        pip install detect-secrets
        npm run secrets:detect

    - name: Security Audit (npm audit)
      run: npm audit --audit-level=high --production

    - name: Node.js Security Scan (njsscan)
      uses: ajinabraham/njsscan-action@v0.0.3
      with:
        args: '.'

    - name: Run Tests
      run: npm test

    - name: Run E2E Tests
      run: npm run test:e2e

    - name: Build Application
      run: npm run build

    - name: Bundle Size Check
      run: npm run bundle:analyze
