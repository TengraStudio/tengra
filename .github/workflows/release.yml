name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            release_script: build:exe
            artifact_globs: |
              release/*.exe
              release/*.zip
          - os: ubuntu-latest
            release_script: build:linux
            artifact_globs: |
              release/*.AppImage
              release/*.deb
              release/*.rpm
              release/*.zip
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Dependencies
        run: npm ci

      - name: Validate Changelog
        run: npm run changelog:sync && npm run changelog:i18n:gate

      - name: Build Application
        run: npm run build
        env:
          CI: true

      - name: Build Electron App
        run: npm run ${{ matrix.release_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact_globs }}
          draft: false
          prerelease: false
